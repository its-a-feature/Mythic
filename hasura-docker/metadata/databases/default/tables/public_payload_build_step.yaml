table:
  name: payload_build_step
  schema: public
object_relationships:
  - name: payload
    using:
      foreign_key_constraint_on: payload_id
  - name: payloadtype
    using:
      foreign_key_constraint_on: payloadtype_id
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - end_time
        - id
        - payload_id
        - payloadtype_id
        - start_time
        - step_description
        - step_name
        - step_number
        - step_skip
        - step_stderr
        - step_stdout
        - step_success
      filter:
        _and:
          - _or:
              - payloadtype_id:
                  _is_null: false
              - payload:
                  operation_id:
                    _eq: X-Hasura-current-operation-id
          - _or:
              - payloadtype_id:
                  _is_null: false
              - payload:
                  operation_id:
                    _in: X-Hasura-Scope-payload-read-operations
  - role: operation_admin
    permission:
      columns:
        - end_time
        - id
        - payload_id
        - payloadtype_id
        - start_time
        - step_description
