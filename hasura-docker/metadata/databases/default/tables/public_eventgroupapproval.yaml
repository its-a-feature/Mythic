table:
  name: eventgroupapproval
  schema: public
object_relationships:
  - name: eventgroup
    using:
      foreign_key_constraint_on: eventgroup_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - approved
        - eventgroup_id
        - id
        - operation_id
        - operator_id
        - created_at
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-eventing-read-operation
    comment: ""
  - role: operation_admin
    permission:
      columns:
        - approved
        - eventgroup_id
        - id
        - operation_id
        - operator_id
        - created_at
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-eventing-read-operation
    comment: ""
  - role: operator
    permission:
      columns:
        - approved
        - eventgroup_id
        - id
        - operation_id
        - operator_id
        - created_at
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-eventing-read-operation
    comment: ""
  - role: spectator
    permission:
      columns:
        - approved
        - eventgroup_id
        - id
        - operation_id
        - operator_id
        - created_at
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-eventing-read-operation
    comment: ""
