table:
  name: disabledcommandsprofile
  schema: public
object_relationships:
  - name: command
    using:
      foreign_key_constraint_on: command_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
array_relationships:
  - name: operatoroperations
    using:
      foreign_key_constraint_on:
        column: base_disabled_commands_id
        table:
          name: operatoroperation
          schema: public
insert_permissions:
  - role: mythic_admin
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-Current-Operation-Id
          - operation_id:
              _in: X-Hasura-Scope-operation-write-operations
      set:
        operation_id: x-hasura-current-operation-id
      columns:
        - command_id
        - name
  - role: operation_admin
    permission:
      check:
        _and:
          - _and:
              - operation_id:
                  _eq: x-hasura-current-operation-id
              - operatoroperations:
                  _and:
                    - view_mode:
                        _eq: lead
                    - operator_id:
                        _eq: x-hasura-user-id
                    - operation_id:
                        _eq: x-hasura-current-operation-id
          - _and:
              - operation_id:
                  _in: X-Hasura-Scope-operation-write-operations
              - operatoroperations:
                  _and:
                    - view_mode:
                        _eq: lead
                    - operator_id:
                        _eq: x-hasura-user-id
                    - operation_id:
                        _in: X-Hasura-Scope-operation-write-operations
      set:
        operation_id: x-hasura-current-operation-id
      columns:
        - command_id
        - name
  - role: operator
    permission:
      check:
        _and:
          - _and:
              - operation_id:
                  _eq: x-hasura-current-operation-id
              - operatoroperations:
                  _and:
                    - view_mode:
                        _eq: lead
                    - operator_id:
                        _eq: x-hasura-user-id
                    - operation_id:
                        _eq: x-hasura-current-operation-id
          - _and:
              - operation_id:
                  _in: X-Hasura-Scope-operation-write-operations
              - operatoroperations:
                  _and:
                    - view_mode:
                        _eq: lead
                    - operator_id:
                        _eq: x-hasura-user-id
                    - operation_id:
                        _in: X-Hasura-Scope-operation-write-operations
      set:
        operation_id: x-hasura-current-operation-id
      columns:
        - command_id
        - name
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - command_id
        - id
        - name
        - operation_id
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-Current-Operation-Id
          - operation_id:
              _in: X-Hasura-Scope-operation-read-operations
  - role: operation_admin
    permission:
      columns:
        - command_id
        - id
        - name
        - operation_id
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-Current-Operation-Id
          - operation_id:
              _in: X-Hasura-Scope-operation-read-operations
  - role: operator
    permission:
      columns:
        - command_id
        - id
        - name
        - operation_id
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-Current-Operation-Id
          - operation_id:
              _in: X-Hasura-Scope-operation-read-operations
  - role: spectator
    permission:
      columns:
        - command_id
        - id
        - name
        - operation_id
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-Current-Operation-Id
          - operation_id:
              _in: X-Hasura-Scope-operation-read-operations
delete_permissions:
  - role: mythic_admin
    permission:
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-Current-Operation-Id
          - operation_id:
              _in: X-Hasura-Scope-operation-write-operations
  - role: operation_admin
    permission:
      filter:
        _and:
          - _and:
              - operation_id:
                  _eq: x-hasura-current-operation-id
              - operatoroperations:
                  _and:
                    - view_mode:
                        _eq: lead
                    - operator_id:
                        _eq: x-hasura-user-id
                    - operation_id:
                        _eq: x-hasura-current-operation-id
          - _and:
              - operation_id:
                  _in: X-Hasura-Scope-operation-write-operations
              - operatoroperations:
                  _and:
                    - view_mode:
                        _eq: lead
                    - operator_id:
                        _eq: x-hasura-user-id
                    - operation_id:
                        _in: X-Hasura-Scope-operation-write-operations
  - role: operator
    permission:
      filter:
        _and:
          - _and:
              - operation_id:
                  _eq: x-hasura-current-operation-id
              - operatoroperations:
                  _and:
                    - view_mode:
                        _eq: lead
                    - operator_id:
                        _eq: x-hasura-user-id
                    - operation_id:
                        _eq: x-hasura-current-operation-id
          - _and:
              - operation_id:
                  _in: X-Hasura-Scope-operation-write-operations
              - operatoroperations:
                  _and:
                    - view_mode:
                        _eq: lead
                    - operator_id:
                        _eq: x-hasura-user-id
                    - operation_id:
                        _in: X-Hasura-Scope-operation-write-operations
