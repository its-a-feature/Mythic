table:
  name: eventgroup
  schema: public
object_relationships:
  - name: filemetum
    using:
      foreign_key_constraint_on: filemeta_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
array_relationships:
  - name: eventgroupapprovals
    using:
      foreign_key_constraint_on:
        column: eventgroup_id
        table:
          name: eventgroupapproval
          schema: public
  - name: eventgroupconsumingcontainers
    using:
      foreign_key_constraint_on:
        column: eventgroup_id
        table:
          name: eventgroupconsumingcontainer
          schema: public
  - name: eventgroupinstances
    using:
      foreign_key_constraint_on:
        column: eventgroup_id
        table:
          name: eventgroupinstance
          schema: public
  - name: eventsteps
    using:
      foreign_key_constraint_on:
        column: eventgroup_id
        table:
          name: eventstep
          schema: public
  - name: filemeta
    using:
      foreign_key_constraint_on:
        column: eventgroup_id
        table:
          name: filemeta
          schema: public
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - active
        - approved_to_run
        - deleted
        - filemeta_id
        - id
        - operation_id
        - operator_id
        - total_order_steps
        - total_steps
        - environment
        - keywords
        - trigger_data
        - description
        - name
        - run_as
        - trigger
        - created_at
        - next_scheduled_run
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventing-read-operations
      allow_aggregations: true
    comment: ""
  - role: operation_admin
    permission:
      columns:
        - active
        - approved_to_run
        - deleted
        - filemeta_id
        - id
        - operation_id
        - operator_id
        - total_order_steps
        - total_steps
        - environment
        - keywords
        - trigger_data
        - description
        - name
        - run_as
        - trigger
        - created_at
        - next_scheduled_run
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventing-read-operations
      allow_aggregations: true
    comment: ""
  - role: operator
    permission:
      columns:
        - active
        - approved_to_run
        - deleted
        - filemeta_id
        - id
        - operation_id
        - operator_id
        - total_order_steps
        - total_steps
        - environment
        - keywords
        - trigger_data
        - description
        - name
        - run_as
        - trigger
        - created_at
        - next_scheduled_run
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventing-read-operations
      allow_aggregations: true
    comment: ""
  - role: spectator
    permission:
      columns:
        - active
        - approved_to_run
        - deleted
        - filemeta_id
        - id
        - operation_id
        - operator_id
        - total_order_steps
        - total_steps
        - environment
        - keywords
        - trigger_data
        - description
        - name
        - run_as
        - trigger
        - created_at
        - next_scheduled_run
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventing-read-operations
      allow_aggregations: true
    comment: ""
