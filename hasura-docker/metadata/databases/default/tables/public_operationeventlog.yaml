    permission:
      columns:
        - deleted
        - level
        - resolved
        - warning
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventlog-write-operations
      check: null
  - role: operation_admin
    permission:
      columns:
        - deleted
        - level
        - resolved
        - warning
      filter:
        _and:
          - operation_id:
