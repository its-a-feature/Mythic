table:
  name: operationeventlog
  schema: public
object_relationships:
  - name: apitoken
    using:
      foreign_key_constraint_on: apitokens_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
insert_permissions:
  - role: mythic_admin
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventlog-write-operations
      set:
        operation_id: x-hasura-current-operation-id
        operator_id: x-hasura-user-id
      columns:
        - apitokens_id
        - deleted
        - level
        - message
        - operation_id
        - operator_id
        - resolved
        - source
        - warning
    comment: ""
  - role: operation_admin
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventlog-write-operations
      set:
        operation_id: x-hasura-current-operation-id
        operator_id: x-hasura-user-id
      columns:
        - apitokens_id
        - deleted
        - level
        - message
        - operation_id
        - operator_id
        - resolved
        - source
        - warning
    comment: ""
  - role: operator
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventlog-write-operations
      set:
        operation_id: x-hasura-current-operation-id
        operator_id: x-hasura-user-id
      columns:
        - apitokens_id
        - deleted
        - level
        - message
        - operation_id
        - operator_id
        - resolved
        - source
        - warning
    comment: ""
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - deleted
        - resolved
        - warning
        - apitokens_id
        - count
        - id
        - operation_id
        - operator_id
        - level
        - message
        - source
        - timestamp
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventlog-read-operations
      allow_aggregations: true
  - role: operation_admin
    permission:
      columns:
        - deleted
        - resolved
        - warning
        - apitokens_id
        - count
        - id
        - operation_id
        - operator_id
        - level
        - message
        - source
        - timestamp
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventlog-read-operations
      allow_aggregations: true
  - role: operator
    permission:
      columns:
        - deleted
        - resolved
        - warning
        - apitokens_id
        - count
        - id
        - operation_id
        - operator_id
        - level
        - message
        - source
        - timestamp
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventlog-read-operations
      allow_aggregations: true
  - role: spectator
    permission:
      columns:
        - deleted
        - resolved
        - warning
        - apitokens_id
        - count
        - id
        - operation_id
        - operator_id
        - level
        - message
        - source
        - timestamp
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-eventlog-read-operations
      allow_aggregations: true
update_permissions:
