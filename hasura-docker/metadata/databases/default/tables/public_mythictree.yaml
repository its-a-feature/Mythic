        - callback_id
        - id
        - operation_id
        - task_id
        - metadata
        - comment
        - host
        - os
        - tree_type
        - timestamp
      computed_fields:
        - display_path_text
        - full_path_text
        - name_text
        - parent_path_text
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
