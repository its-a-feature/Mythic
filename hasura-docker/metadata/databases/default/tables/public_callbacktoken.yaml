table:
  name: callbacktoken
  schema: public
object_relationships:
  - name: callback
    using:
      foreign_key_constraint_on: callback_id
  - name: task
    using:
      foreign_key_constraint_on: task_id
  - name: token
    using:
      foreign_key_constraint_on: token_id
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - deleted
        - callback_id
        - id
        - task_id
        - token_id
        - host
        - os
        - timestamp_created
      filter:
        _and:
          - callback:
              operation_id:
                _eq: X-Hasura-current-operation-id
          - callback:
              operation_id:
                _in: X-Hasura-Scope-callback-read-operations
  - role: operation_admin
    permission:
      columns:
        - deleted
        - callback_id
        - id
        - task_id
        - token_id
        - host
        - os
        - timestamp_created
      filter:
        _and:
          - callback:
              operation_id:
                _eq: X-Hasura-current-operation-id
          - callback:
              operation_id:
                _in: X-Hasura-Scope-callback-read-operations
  - role: operator
