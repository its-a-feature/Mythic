table:
  name: credential
  schema: public
configuration:
  column_config:
    credential:
      custom_name: credential_raw
  custom_column_names:
    credential: credential_raw
  custom_root_fields: {}
object_relationships:
  - name: apitoken
    using:
      foreign_key_constraint_on: apitokens_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
  - name: task
    using:
      foreign_key_constraint_on: task_id
array_relationships:
  - name: tags
    using:
      foreign_key_constraint_on:
        column: credential_id
        table:
          name: tag
          schema: public
computed_fields:
  - name: credential_text
    definition:
      function:
        name: credential_credentials
        schema: public
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - deleted
        - credential
        - apitokens_id
        - id
        - operation_id
        - operator_id
        - task_id
        - account
        - comment
        - metadata
        - realm
        - type
        - timestamp
      computed_fields:
        - credential_text
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-read-operation
      allow_aggregations: true
  - role: operation_admin
    permission:
      columns:
        - deleted
        - credential
        - apitokens_id
        - id
        - operation_id
        - operator_id
        - task_id
        - account
        - comment
        - metadata
        - realm
        - type
        - timestamp
      computed_fields:
        - credential_text
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-read-operation
      allow_aggregations: true
  - role: operator
    permission:
      columns:
        - deleted
        - credential
        - apitokens_id
        - id
        - operation_id
        - operator_id
        - task_id
        - account
        - comment
        - metadata
        - realm
        - type
        - timestamp
      computed_fields:
        - credential_text
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-read-operation
      allow_aggregations: true
  - role: spectator
    permission:
      columns:
        - deleted
        - credential
        - apitokens_id
        - id
        - operation_id
        - operator_id
        - task_id
        - account
        - comment
        - metadata
        - realm
        - type
        - timestamp
      computed_fields:
        - credential_text
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-read-operation
      allow_aggregations: true
update_permissions:
  - role: mythic_admin
    permission:
      columns:
        - account
        - comment
        - credential
        - deleted
        - metadata
        - operator_id
        - realm
        - type
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-write-operation
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-write-operation
      set:
        operator_id: x-hasura-user-id
  - role: operation_admin
    permission:
      columns:
        - account
        - comment
        - credential
        - deleted
        - metadata
        - operator_id
        - realm
        - type
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-write-operation
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-write-operation
      set:
        operator_id: x-hasura-user-id
  - role: operator
    permission:
      columns:
        - account
        - comment
        - credential
        - deleted
        - metadata
        - operator_id
        - realm
        - type
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-write-operation
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-credential-write-operation
      set:
        operator_id: x-hasura-user-id
