        - payload_id
        - instance_name
        - value
      computed_fields:
        - dec_key_base64
        - enc_key_base64
      filter:
        _and:
          - _or:
              - operation_id:
                  _eq: X-Hasura-current-operation-id
              - payload:
                  operation_id:
                    _eq: X-Hasura-current-operation-id
          - _or:
              - operation_id:
                  _in: X-Hasura-Scope-payload-read-operations
              - payload:
                  operation_id:
                    _in: X-Hasura-Scope-payload-read-operations
  - role: spectator
    permission:
      columns:
        - dec_key
        - enc_key
        - c2_profile_id
        - c2_profile_parameters_id
        - callback_id
        - count
        - id
        - operation_id
        - payload_id
        - instance_name
        - value
      computed_fields:
        - dec_key_base64
        - enc_key_base64
      filter:
        _and:
          - _or:
              - operation_id:
                  _eq: X-Hasura-current-operation-id
              - payload:
                  operation_id:
