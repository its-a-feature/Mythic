table:
  name: c2profileparametersinstance
  schema: public
object_relationships:
  - name: c2profile
    using:
      foreign_key_constraint_on: c2_profile_id
  - name: c2profileparameter
    using:
      foreign_key_constraint_on: c2_profile_parameters_id
  - name: callback
    using:
      foreign_key_constraint_on: callback_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: payload
    using:
      foreign_key_constraint_on: payload_id
computed_fields:
  - name: dec_key_base64
    definition:
      function:
        name: c2profileparametersinstance_deckey
        schema: public
  - name: enc_key_base64
    definition:
      function:
        name: c2profileparametersinstance_enckey
        schema: public
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - dec_key
        - enc_key
        - c2_profile_id
        - c2_profile_parameters_id
        - callback_id
        - count
        - id
        - operation_id
        - payload_id
        - instance_name
        - value
      computed_fields:
        - dec_key_base64
        - enc_key_base64
      filter:
        _and:
          - _or:
              - operation_id:
                  _eq: X-Hasura-current-operation-id
              - payload:
                  operation_id:
                    _eq: X-Hasura-current-operation-id
          - _or:
              - operation_id:
                  _in: X-Hasura-Scope-payload-read-operations
              - payload:
                  operation_id:
                    _in: X-Hasura-Scope-payload-read-operations
  - role: operation_admin
    permission:
      columns:
        - dec_key
        - enc_key
        - c2_profile_id
