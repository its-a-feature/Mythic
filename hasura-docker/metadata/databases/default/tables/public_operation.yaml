select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - complete
        - deleted
        - admin_id
        - alert_count
        - apitokens_id
        - id
        - banner_color
        - banner_text
        - channel
        - name
        - webhook
        - updated_at
      filter: {}
  - role: operation_admin
    permission:
      columns:
        - complete
        - deleted
        - admin_id
        - alert_count
        - apitokens_id
        - id
        - banner_color
        - banner_text
        - channel
        - name
        - webhook
        - updated_at
      filter:
        _and:
          - id:
              _eq: X-Hasura-current-operation-id
          - id:
              _lte: X-Hasura-Scope-operation-read-operation
  - role: operator
    permission:
      columns:
        - complete
        - deleted
        - admin_id
        - alert_count
        - apitokens_id
        - id
        - banner_color
        - banner_text
        - channel
        - name
        - webhook
        - updated_at
      filter:
        _and:
          - id:
              _eq: X-Hasura-current-operation-id
          - id:
              _lte: X-Hasura-Scope-operation-read-operation
  - role: spectator
    permission:
      columns:
        - complete
        - deleted
        - admin_id
        - alert_count
        - apitokens_id
        - id
        - banner_color
        - banner_text
        - channel
        - name
        - webhook
        - updated_at
      filter:
        _and:
          - id:
              _eq: X-Hasura-current-operation-id
          - id:
              _lte: X-Hasura-Scope-operation-read-operation
