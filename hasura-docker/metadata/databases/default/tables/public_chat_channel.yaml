                      _lte: X-Hasura-Scope-chat-read-operation
              - _and:
                  - channel_type:
                      _eq: ai
                  - operation_id:
                      _lte: X-Hasura-Scope-chat-ai-read-operation
      allow_aggregations: true
  - role: operator
    permission:
      columns:
        - ai_metadata
        - apitokens_id
        - archived
        - archived_at
        - archived_by
        - channel_type
        - chat_container_id
        - chat_model
        - created_at
        - created_by
        - description
        - id
        - locked
        - locked_at
        - locked_by
        - last_message_id
        - name
        - operation_id
        - slug
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - _or:
              - _and:
                  - channel_type:
