table:
  name: tagtype
  schema: public
object_relationships:
  - name: apitoken
    using:
      foreign_key_constraint_on: apitokens_id
  - name: eventstepinstance
    using:
      foreign_key_constraint_on: eventstepinstance_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
array_relationships:
  - name: tags
    using:
      foreign_key_constraint_on:
        column: tagtype_id
        table:
          name: tag
          schema: public
insert_permissions:
  - role: mythic_admin
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-tag-write-operations
      set:
        operation_id: x-hasura-current-operation-id
      columns:
        - apitokens_id
        - color
        - description
        - eventstepinstance_id
        - name
        - operation_id
  - role: operation_admin
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-tag-write-operations
      set:
        operation_id: x-hasura-current-operation-id
      columns:
        - apitokens_id
        - color
        - description
        - eventstepinstance_id
        - name
        - operation_id
  - role: operator
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-tag-write-operations
      set:
        operation_id: x-hasura-current-operation-id
      columns:
        - apitokens_id
        - color
        - description
        - eventstepinstance_id
        - name
        - operation_id
select_permissions:
