table:
  name: payloadonhost
  schema: public
object_relationships:
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: payload
    using:
      foreign_key_constraint_on: payload_id
  - name: task
    using:
      foreign_key_constraint_on: task_id
insert_permissions:
  - role: mythic_admin
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-payload-write-operation
      set:
        operation_id: x-hasura-current-operation-id
      columns:
        - host
        - payload_id
  - role: operation_admin
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-payload-write-operation
      set:
        operation_id: x-hasura-current-operation-id
      columns:
        - host
        - payload_id
  - role: operator
    permission:
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-payload-write-operation
      set:
        operation_id: x-hasura-current-operation-id
      columns:
        - host
        - payload_id
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - id
        - host
        - payload_id
        - deleted
        - operation_id
        - timestamp
        - task_id
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-payload-read-operation
  - role: operation_admin
    permission:
      columns:
        - id
        - host
        - payload_id
        - deleted
        - operation_id
        - timestamp
        - task_id
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-payload-read-operation
  - role: operator
    permission:
      columns:
        - id
        - host
        - payload_id
        - deleted
        - operation_id
        - timestamp
        - task_id
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-payload-read-operation
  - role: spectator
    permission:
      columns:
        - id
        - host
        - payload_id
        - deleted
        - operation_id
        - timestamp
        - task_id
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-payload-read-operation
update_permissions:
  - role: mythic_admin
    permission:
      columns:
        - deleted
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-payload-write-operation
      check: null
  - role: operation_admin
    permission:
      columns:
        - deleted
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-payload-write-operation
      check: null
  - role: operator
    permission:
      columns:
