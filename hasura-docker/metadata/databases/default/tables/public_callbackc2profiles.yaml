table:
  name: callbackc2profiles
  schema: public
object_relationships:
  - name: c2profile
    using:
      foreign_key_constraint_on: c2_profile_id
  - name: callback
    using:
      foreign_key_constraint_on: callback_id
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - c2_profile_id
        - callback_id
        - id
      filter:
        _and:
          - callback:
              operation_id:
                _eq: X-Hasura-current-operation-id
          - callback:
              operation_id:
                _lte: X-Hasura-Scope-callback-read-operation
  - role: operation_admin
    permission:
      columns:
        - c2_profile_id
        - callback_id
        - id
      filter:
        _and:
          - callback:
              operation_id:
                _eq: X-Hasura-current-operation-id
          - callback:
              operation_id:
                _lte: X-Hasura-Scope-callback-read-operation
  - role: operator
    permission:
      columns:
        - c2_profile_id
        - callback_id
        - id
      filter:
        _and:
          - callback:
              operation_id:
                _eq: X-Hasura-current-operation-id
          - callback:
              operation_id:
                _lte: X-Hasura-Scope-callback-read-operation
  - role: spectator
    permission:
      columns:
        - c2_profile_id
        - callback_id
        - id
      filter:
        _and:
          - callback:
              operation_id:
                _eq: X-Hasura-current-operation-id
          - callback:
              operation_id:
                _lte: X-Hasura-Scope-callback-read-operation
