table:
  name: buildparameterinstance
  schema: public
object_relationships:
  - name: buildparameter
    using:
      foreign_key_constraint_on: build_parameter_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: payload
    using:
      foreign_key_constraint_on: payload_id
computed_fields:
  - name: dec_key_base64
    definition:
      function:
        name: buildparameterinstance_deckey
        schema: public
  - name: enc_key_base64
    definition:
      function:
        name: buildparameterinstance_enckey
        schema: public
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - dec_key
        - enc_key
        - build_parameter_id
        - id
        - operation_id
        - payload_id
        - instance_name
        - value
      computed_fields:
        - dec_key_base64
        - enc_key_base64
      filter:
        _or:
          - _and:
              - operation_id:
                  _eq: x-hasura-current-operation-id
              - operation_id:
                  _lte: X-Hasura-Scope-payload-read-operation
          - _and:
              - payload:
                  operation_id:
                    _eq: x-hasura-current-operation-id
              - payload:
                  operation_id:
                    _lte: X-Hasura-Scope-payload-read-operation
