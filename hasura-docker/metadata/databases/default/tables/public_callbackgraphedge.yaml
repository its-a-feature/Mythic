table:
  name: callbackgraphedge
  schema: public
object_relationships:
  - name: apitoken
    using:
      foreign_key_constraint_on: apitokens_id
  - name: c2profile
    using:
      foreign_key_constraint_on: c2_profile_id
  - name: destination
    using:
      foreign_key_constraint_on: destination_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: source
    using:
      foreign_key_constraint_on: source_id
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - apitokens_id
        - c2_profile_id
        - destination_id
        - id
        - operation_id
        - source_id
        - metadata
        - end_timestamp
        - start_timestamp
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-callback-read-operations
      allow_aggregations: true
  - role: operation_admin
    permission:
      columns:
        - apitokens_id
        - c2_profile_id
        - destination_id
        - id
        - operation_id
        - source_id
        - metadata
        - end_timestamp
        - start_timestamp
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-callback-read-operations
      allow_aggregations: true
  - role: operator
    permission:
      columns:
        - apitokens_id
        - c2_profile_id
        - destination_id
        - id
        - operation_id
        - source_id
        - metadata
        - end_timestamp
        - start_timestamp
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-callback-read-operations
      allow_aggregations: true
  - role: spectator
    permission:
      columns:
        - apitokens_id
        - c2_profile_id
        - destination_id
        - id
        - operation_id
        - source_id
        - metadata
        - end_timestamp
        - start_timestamp
        - updated_at
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-callback-read-operations
      allow_aggregations: true
