table:
  name: token
  schema: public
object_relationships:
  - name: operation
    using:
      manual_configuration:
        column_mapping:
          operation_id: id
        insertion_order: null
        remote_table:
          name: operation
          schema: public
  - name: task
    using:
      foreign_key_constraint_on: task_id
array_relationships:
  - name: callbacktokens
    using:
      foreign_key_constraint_on:
        column: token_id
        table:
          name: callbacktoken
          schema: public
  - name: tasks
    using:
      foreign_key_constraint_on:
        column: token_id
        table:
          name: task
          schema: public
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - id
        - token_id
        - user
        - groups
        - default_dacl
        - session_id
        - restricted
        - capabilities
        - logon_sid
        - integrity_level_sid
        - app_container_sid
        - privileges
        - handle
        - task_id
        - timestamp
        - deleted
        - host
        - thread_id
        - process_id
        - description
        - operation_id
        - app_container_number
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-response-read-operations
      allow_aggregations: true
