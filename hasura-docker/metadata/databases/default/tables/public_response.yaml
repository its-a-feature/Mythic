table:
  name: response
  schema: public
configuration:
  column_config:
    response:
      custom_name: response_raw
  custom_column_names:
    response: response_raw
  custom_root_fields: {}
object_relationships:
  - name: apitoken
    using:
      foreign_key_constraint_on: apitokens_id
  - name: eventstepinstance
    using:
      foreign_key_constraint_on: eventstepinstance_id
  - name: operation
    using:
      manual_configuration:
        column_mapping:
          operation_id: id
        insertion_order: null
        remote_table:
          name: operation
          schema: public
  - name: task
    using:
      foreign_key_constraint_on: task_id
array_relationships:
  - name: tags
    using:
      foreign_key_constraint_on:
        column: response_id
        table:
          name: tag
          schema: public
computed_fields:
  - name: response_escape
    definition:
      function:
        name: response_escape
        schema: public
  - name: response_text
    definition:
      function:
        name: response
        schema: public
    comment: convert bytea to text for responses
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - apitokens_id
        - eventstepinstance_id
        - id
        - is_error
        - operation_id
        - response
        - sequence_number
        - task_id
        - timestamp
      computed_fields:
        - response_escape
        - response_text
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-response-read-operations
      allow_aggregations: true
  - role: operation_admin
    permission:
      columns:
        - apitokens_id
        - eventstepinstance_id
        - id
        - is_error
        - operation_id
        - response
        - sequence_number
        - task_id
        - timestamp
      computed_fields:
        - response_escape
        - response_text
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-response-read-operations
      allow_aggregations: true
  - role: operator
    permission:
      columns:
        - apitokens_id
        - eventstepinstance_id
        - id
        - is_error
        - operation_id
        - response
        - sequence_number
        - task_id
        - timestamp
      computed_fields:
        - response_escape
        - response_text
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-response-read-operations
      allow_aggregations: true
  - role: spectator
    permission:
      columns:
        - is_error
        - response
        - apitokens_id
        - eventstepinstance_id
        - id
        - operation_id
        - sequence_number
        - task_id
        - timestamp
      computed_fields:
        - response_escape
        - response_text
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-response-read-operations
      allow_aggregations: true