table:
  name: callback
  schema: public
configuration:
  column_config:
    timestamp:
      custom_name: timestamp
  custom_column_names:
    timestamp: timestamp
  custom_root_fields: {}
object_relationships:
  - name: eventstepinstance
    using:
      foreign_key_constraint_on: eventstepinstance_id
  - name: locked_operator
    using:
      foreign_key_constraint_on: locked_operator_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
  - name: payload
    using:
      foreign_key_constraint_on: registered_payload_id
array_relationships:
  - name: apitokens
    using:
      foreign_key_constraint_on:
        column: callback_id
        table:
          name: apitokens
          schema: public
  - name: c2profileparametersinstances
    using:
      foreign_key_constraint_on:
        column: callback_id
        table:
          name: c2profileparametersinstance
          schema: public
  - name: callbackc2profiles
    using:
      foreign_key_constraint_on:
        column: callback_id
        table:
          name: callbackc2profiles
          schema: public
  - name: callbackgraphedges
    using:
      foreign_key_constraint_on:
        column: source_id
        table:
          name: callbackgraphedge
          schema: public
  - name: callbackgraphedgesByDestinationId
    using:
      foreign_key_constraint_on:
        column: destination_id
        table:
          name: callbackgraphedge
          schema: public
  - name: callbackports
    using:
      foreign_key_constraint_on:
        column: callback_id
        table:
          name: callbackport
          schema: public
  - name: callbacktokens
    using:
      foreign_key_constraint_on:
        column: callback_id
        table:
          name: callbacktoken
          schema: public
  - name: loadedcommands
    using:
      foreign_key_constraint_on:
        column: callback_id
        table:
          name: loadedcommands
          schema: public
  - name: mythictrees
    using:
      foreign_key_constraint_on:
        column: callback_id
        table:
          name: mythictree
          schema: public
  - name: tags
    using:
      foreign_key_constraint_on:
        column: callback_id
        table:
          name: tag
          schema: public
  - name: tasks
    using:
      foreign_key_constraint_on:
        column: callback_id
        table:
          name: task
          schema: public
computed_fields:
  - name: current_time
    definition:
      function:
        name: current_time
        schema: public
  - name: dec_key_base64
    definition:
      function:
        name: callback_deckey
        schema: public
    comment: base64 encode decryption key
  - name: enc_key_base64
    definition:
      function:
        name: callback_enckey
        schema: public
    comment: base64 encode the encryption key
  - name: mythictree_groups_string
    definition:
      function:
        name: callback_mythictree_groups
        schema: public
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - mythictree_groups
        - active
        - dead
        - locked
        - dec_key
        - enc_key
        - display_id
        - eventstepinstance_id
        - id
        - integrity_level
        - locked_operator_id
        - operation_id
        - operator_id
        - pid
        - registered_payload_id
        - trigger_on_checkin_after_time
        - agent_callback_id
        - architecture
        - color
        - crypto_type
        - cwd
        - description
        - domain
        - external_ip
        - extra_info
        - host
        - ip
        - os
        - process_name
        - process_short_name
        - sleep_info
        - user
        - impersonation_context
        - init_callback
        - last_checkin
        - timestamp
      computed_fields:
        - current_time
        - dec_key_base64
        - enc_key_base64
        - mythictree_groups_string
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _lte: X-Hasura-Scope-callback-read-operation
      allow_aggregations: true
  - role: operation_admin
