table:
  name: attacktask
  schema: public
object_relationships:
  - name: attack
    using:
      foreign_key_constraint_on: attack_id
  - name: task
    using:
      foreign_key_constraint_on: task_id
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - id
        - attack_id
        - task_id
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-task-read-operations
  - role: operation_admin
    permission:
      columns:
        - id
        - attack_id
        - task_id
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-task-read-operations
  - role: operator
    permission:
      columns:
        - id
        - attack_id
        - task_id
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-task-read-operations
  - role: spectator
    permission:
      columns:
        - id
        - attack_id
        - task_id
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-task-read-operations
delete_permissions:
  - role: mythic_admin
    permission:
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-task-write-operations
  - role: operation_admin
    permission:
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-task-write-operations
  - role: operator
    permission:
      filter:
        _and:
          - task:
              callback:
                operation_id:
                  _eq: X-Hasura-current-operation-id
          - task:
              callback:
                operation_id:
                  _in: X-Hasura-Scope-task-write-operations
