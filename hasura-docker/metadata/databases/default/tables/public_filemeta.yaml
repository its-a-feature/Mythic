table:
  name: filemeta
  schema: public
object_relationships:
  - name: apitoken
    using:
      foreign_key_constraint_on: apitokens_id
  - name: copy_of_file
    using:
      foreign_key_constraint_on: copy_of_file_id
  - name: eventgroup
    using:
      foreign_key_constraint_on: eventgroup_id
  - name: eventstepinstance
    using:
      foreign_key_constraint_on: eventstepinstance_id
  - name: mythictree
    using:
      foreign_key_constraint_on: mythictree_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
  - name: task
    using:
      foreign_key_constraint_on: task_id
array_relationships:
  - name: copies_of_file
    using:
      foreign_key_constraint_on:
        column: copy_of_file_id
        table:
          name: filemeta
          schema: public
  - name: eventgroups
    using:
      foreign_key_constraint_on:
        column: filemeta_id
        table:
          name: eventgroup
          schema: public
  - name: payloads
    using:
      foreign_key_constraint_on:
        column: file_id
        table:
          name: payload
          schema: public
  - name: tags
    using:
      foreign_key_constraint_on:
        column: filemeta_id
        table:
          name: tag
          schema: public
computed_fields:
  - name: filename_text
    definition:
      function:
        name: filemeta_filename
        schema: public
    comment: convert bytea filename to text
  - name: filename_utf8
    definition:
      function:
        name: filemeta_filename_utf8
        schema: public
  - name: full_remote_path_text
    definition:
      function:
        name: filemeta_full_remote_path
        schema: public
    comment: convert bytea full_remote_path to text
  - name: full_remote_path_utf8
    definition:
      function:
        name: filemeta_full_remote_path_utf8
        schema: public
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - agent_file_id
        - apitokens_id
        - chunk_size
        - chunks_received
        - comment
        - complete
        - copy_of_file_id
        - delete_after_fetch
        - deleted
        - eventgroup_id
        - eventstepinstance_id
        - filename
        - full_remote_path
        - host
        - id
        - is_download_from_agent
        - is_payload
        - is_screenshot
        - md5
        - mythictree_id
        - operation_id
        - operator_id
        - path
        - received_chunk_ids
        - sha1
        - size
        - task_id
        - timestamp
        - total_chunks
      computed_fields:
        - filename_text
        - filename_utf8
        - full_remote_path_text
        - full_remote_path_utf8
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-file-read-operations
      allow_aggregations: true
  - role: operation_admin
    permission:
      columns:
        - agent_file_id
        - apitokens_id
        - chunk_size
        - chunks_received
        - comment
        - complete
        - copy_of_file_id
        - delete_after_fetch
        - deleted
        - eventgroup_id
        - eventstepinstance_id
        - filename
        - full_remote_path
        - host
        - id
        - is_download_from_agent
        - is_payload
        - is_screenshot
        - md5
        - mythictree_id
        - operation_id
        - operator_id
        - path
        - received_chunk_ids
        - sha1
        - size
        - task_id
        - timestamp
        - total_chunks
      computed_fields:
        - filename_text
        - filename_utf8
        - full_remote_path_text
        - full_remote_path_utf8
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-file-read-operations
      allow_aggregations: true
  - role: operator
    permission:
      columns:
        - agent_file_id
        - apitokens_id
        - chunk_size
        - chunks_received
        - comment
        - complete
        - copy_of_file_id
        - delete_after_fetch
        - deleted
        - eventgroup_id
        - eventstepinstance_id
        - filename
        - full_remote_path
        - host
        - id
        - is_download_from_agent
        - is_payload
        - is_screenshot
        - md5
        - mythictree_id
        - operation_id
        - operator_id
        - path
        - received_chunk_ids
        - sha1
        - size
        - task_id
        - timestamp
        - total_chunks
      computed_fields:
        - filename_text
        - filename_utf8
        - full_remote_path_text
        - full_remote_path_utf8
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-file-read-operations
      allow_aggregations: true
  - role: spectator
    permission:
      columns:
        - agent_file_id
        - apitokens_id
        - chunk_size
        - chunks_received
        - comment
        - complete
        - copy_of_file_id
        - delete_after_fetch
        - deleted
        - eventgroup_id
        - eventstepinstance_id
        - filename
        - full_remote_path
        - host
        - id
        - is_download_from_agent
        - is_payload
        - is_screenshot
        - md5
        - mythictree_id
        - operation_id
        - operator_id
        - path
        - received_chunk_ids
        - sha1
        - size
        - task_id
        - timestamp
        - total_chunks
      computed_fields:
        - filename_text
        - filename_utf8
        - full_remote_path_text
        - full_remote_path_utf8
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-file-read-operations
      allow_aggregations: true
update_permissions:
  - role: mythic_admin
    permission:
      columns:
        - comment
        - deleted
        - filename
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-file-write-operations
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-file-write-operations
  - role: operation_admin
    permission:
      columns:
        - comment
        - deleted
        - filename
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-file-write-operations
      check:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-file-write-operations
  - role: operator
    permission:
      columns:
        - comment
        - deleted
        - filename
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-file-write-operations
      check:
        _and:
          - operation_id:
