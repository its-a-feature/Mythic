update_permissions:
  - role: mythic_admin
    permission:
      columns:
        - comment
        - comment_operator_id
        - completed
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-task-write-operations
      check: null
      set:
        comment_operator_id: x-hasura-User-Id
  - role: operation_admin
    permission:
      columns:
        - comment
        - comment_operator_id
        - completed
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-task-write-operations
      check: null
      set:
        comment_operator_id: x-hasura-User-Id
  - role: operator
    permission:
      columns:
        - comment
        - comment_operator_id
        - completed
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-task-write-operations
      check: null
      set:
        comment_operator_id: x-hasura-User-Id
