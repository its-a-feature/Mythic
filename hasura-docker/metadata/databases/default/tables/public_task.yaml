table:
  name: task
  schema: public
object_relationships:
  - name: apitoken
    using:
      foreign_key_constraint_on: apitokens_id
  - name: callback
    using:
      foreign_key_constraint_on: callback_id
  - name: command
    using:
      foreign_key_constraint_on: command_id
  - name: commentOperator
    using:
      foreign_key_constraint_on: comment_operator_id
  - name: eventstepinstance
    using:
      foreign_key_constraint_on: eventstepinstance_id
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
  - name: opsec_post_bypass_user
    using:
      foreign_key_constraint_on: opsec_post_bypass_user_id
  - name: opsec_pre_bypass_user
    using:
      foreign_key_constraint_on: opsec_pre_bypass_user_id
  - name: task
    using:
      foreign_key_constraint_on: parent_task_id
  - name: token
    using:
      foreign_key_constraint_on: token_id
array_relationships:
  - name: apitokens
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: apitokens
          schema: public
  - name: attacktasks
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: attacktask
          schema: public
  - name: callbackports
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: callbackport
          schema: public
  - name: callbacktokens
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: callbacktoken
          schema: public
  - name: credentials
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: credential
          schema: public
  - name: filemeta
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: filemeta
          schema: public
  - name: keylogs
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: keylog
          schema: public
  - name: mythictrees
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: mythictree
          schema: public
  - name: payloadonhosts
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: payloadonhost
          schema: public
  - name: payloads
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: payload
          schema: public
  - name: responses
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: response
          schema: public
  - name: tags
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: tag
          schema: public
  - name: taskartifacts
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: taskartifact
          schema: public
  - name: tasks
    using:
      foreign_key_constraint_on:
        column: parent_task_id
        table:
          name: task
          schema: public
  - name: tokens
    using:
      foreign_key_constraint_on:
        column: task_id
        table:
          name: token
          schema: public
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - agent_task_id
        - apitokens_id
        - callback_id
        - command_id
        - command_name
        - command_payload_type
        - comment
        - comment_operator_id
        - completed
        - completed_callback_function
        - completed_callback_function_completed
        - display_id
        - display_params
        - eventstepinstance_id
        - group_callback_function
        - group_callback_function_completed
        - has_intercepted_response
        - id
        - interactive_task_type
        - is_interactive_task
        - mythic_parsed_params
        - operation_id
        - operator_id
        - opsec_post_blocked
        - opsec_post_bypass_role
        - opsec_post_bypass_user_id
        - opsec_post_bypassed
        - opsec_post_message
        - opsec_pre_blocked
        - opsec_pre_bypass_role
        - opsec_pre_bypass_user_id
        - opsec_pre_bypassed
        - opsec_pre_message
        - original_params
        - parameter_group_name
        - params
        - parent_task_id
        - process_at_original_command
        - response_count
        - status
        - status_timestamp_preprocessing
        - status_timestamp_processed
        - status_timestamp_processing
        - status_timestamp_submitted
        - stderr
        - stdout
        - subtask_callback_function
        - subtask_callback_function_completed
        - subtask_group_name
        - tasking_location
        - timestamp
        - token_id
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-task-read-operations
      allow_aggregations: true
