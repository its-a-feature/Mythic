table:
  name: operatoroperation
  schema: public
object_relationships:
  - name: apitoken
    using:
      foreign_key_constraint_on: apitokens_id
  - name: disabledcommandsprofile
    using:
      foreign_key_constraint_on: base_disabled_commands_id
  - name: operation
    using:
      foreign_key_constraint_on: operation_id
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
select_permissions:
  - role: mythic_admin
    permission:
      columns:
        - apitokens_id
        - base_disabled_commands_id
        - id
        - operation_id
        - operator_id
        - view_mode
        - timestamp
      filter: {}
  - role: operation_admin
    permission:
      columns:
        - apitokens_id
        - base_disabled_commands_id
        - id
        - operation_id
        - operator_id
        - view_mode
        - timestamp
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-operation-read-operations
  - role: operator
    permission:
      columns:
        - apitokens_id
        - base_disabled_commands_id
        - id
        - operation_id
        - operator_id
        - view_mode
        - timestamp
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-operation-read-operations
  - role: spectator
    permission:
      columns:
        - apitokens_id
        - base_disabled_commands_id
        - id
        - operation_id
        - operator_id
        - view_mode
        - timestamp
      filter:
        _and:
          - operation_id:
              _eq: X-Hasura-current-operation-id
          - operation_id:
              _in: X-Hasura-Scope-operation-read-operations
